services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: strongair
      POSTGRES_PASSWORD: strongair_pass
      POSTGRES_DB: strongair_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: strongair-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://strongair:strongair_pass@postgres:5432/strongair_db
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    depends_on:
      - postgres
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: strongair-frontend
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/strong-air.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
